<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zxx" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>数据统计 - 智慧医问-智能医药系统</title>

    <link rel="shortcut icon" type="image/x-icon" href="assets/images/cropped-favicon-32x32.png"/>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/style.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/plugin.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/dashboard.css" rel="stylesheet" type="text/css"/>
    <link href="assets/fonts/flaticon.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/icons.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" href="assets/fonts/line-icons.css" type="text/css"/>
    <link rel="stylesheet" href="common/font-awesome/css/font-awesome.min.css">
    <style>
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .stat-card.green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .stat-card.orange {
            background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%);
        }
        .stat-card.blue {
            background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
        }
        .stat-card.red {
            background: linear-gradient(135deg, #ed213a 0%, #93291e 100%);
        }
        .stat-card .stat-icon {
            font-size: 40px;
            opacity: 0.8;
        }
        .stat-card .stat-number {
            font-size: 36px;
            font-weight: bold;
        }
        .stat-card .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div id="preloader">
    <div id="status"></div>
</div>

<div th:replace="common/common-bar::#header"></div>

<div id="dashboard">
    <div class="container">
        <div class="dashboard-main">
            <div class="row">
                <div class="col-lg-3 col-md-12 col-sm-12 col-xs-12">
                    <div th:replace="common/common-bar::#dashboard-sidebar(cur='stats')"></div>
                </div>
                <div class="col-lg-9 col-md-12 col-sm-12 col-xs-12">
                    <div class="dashboard-content">
                        <h3 class="mb-4">数据统计分析</h3>

                        <div class="row">
                            <div class="col-lg-3 col-md-6 col-sm-6">
                                <div class="stat-card">
                                    <div class="stat-icon"><i class="fa fa-users"></i></div>
                                    <div class="stat-number" th:text="${userCount}">0</div>
                                    <div class="stat-label">用户总数</div>
                                </div>
                            </div>
                            <div class="col-lg-3 col-md-6 col-sm-6">
                                <div class="stat-card green">
                                    <div class="stat-icon"><i class="fa fa-heartbeat"></i></div>
                                    <div class="stat-number" th:text="${illnessCount}">0</div>
                                    <div class="stat-label">疾病总数</div>
                                </div>
                            </div>
                            <div class="col-lg-3 col-md-6 col-sm-6">
                                <div class="stat-card orange">
                                    <div class="stat-icon"><i class="fa fa-medkit"></i></div>
                                    <div class="stat-number" th:text="${medicineCount}">0</div>
                                    <div class="stat-label">药品总数</div>
                                </div>
                            </div>
                            <div class="col-lg-3 col-md-6 col-sm-6">
                                <div class="stat-card blue">
                                    <div class="stat-icon"><i class="fa fa-comments"></i></div>
                                    <div class="stat-number" th:text="${feedbackCount}">0</div>
                                    <div class="stat-label">反馈总数</div>
                                </div>
                            </div>
                        </div>

                        <div class="row mt-4">
                            <div class="col-lg-6 col-md-12">
                                <div class="dashboard-list">
                                    <h4 class="gray"><i class="fa fa-fire cl-green"></i> 热门疾病 TOP10</h4>
                                    <div class="dashboard-list-static">
                                        <table class="table table-hover">
                                            <thead>
                                                <tr>
                                                    <th>排名</th>
                                                    <th>疾病名称</th>
                                                    <th>浏览量</th>
                                                    <th>操作</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="item, iterStat : ${hotIllnessList}">
                                                    <td>
                                                        <span th:if="${iterStat.index == 0}" class="badge bg-danger">🥇 1</span>
                                                        <span th:if="${iterStat.index == 1}" class="badge bg-warning">🥈 2</span>
                                                        <span th:if="${iterStat.index == 2}" class="badge bg-success">🥉 3</span>
                                                        <span th:if="${iterStat.index > 2}" th:text="${iterStat.index + 1}" class="badge bg-secondary"></span>
                                                    </td>
                                                    <td th:text="${item.illnessName}"></td>
                                                    <td><span class="badge bg-info" th:text="${item.pageviews}"></span></td>
                                                    <td><a th:href="@{findIllnessOne(id=${item.id})}" class="btn btn-sm btn-primary">查看详情</a></td>
                                                </tr>
                                                <tr th:if="${hotIllnessList.size() == 0}">
                                                    <td colspan="4" class="text-center text-muted">暂无数据</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                            <div class="col-lg-6 col-md-12">
                                <div class="dashboard-list">
                                    <h4 class="gray"><i class="fa fa-fire cl-orange"></i> 热门药品 TOP10</h4>
                                    <div class="dashboard-list-static">
                                        <table class="table table-hover">
                                            <thead>
                                                <tr>
                                                    <th>排名</th>
                                                    <th>药品名称</th>
                                                    <th>浏览量</th>
                                                    <th>操作</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="item, iterStat : ${hotMedicineList}">
                                                    <td>
                                                        <span th:if="${iterStat.index == 0}" class="badge bg-danger">🥇 1</span>
                                                        <span th:if="${iterStat.index == 1}" class="badge bg-warning">🥈 2</span>
                                                        <span th:if="${iterStat.index == 2}" class="badge bg-success">🥉 3</span>
                                                        <span th:if="${iterStat.index > 2}" th:text="${iterStat.index + 1}" class="badge bg-secondary"></span>
                                                    </td>
                                                    <td th:text="${item.medicineName}"></td>
                                                    <td><span class="badge bg-info" th:text="${item.pageviews}"></span></td>
                                                    <td><a th:href="@{medicine-detail(id=${item.id})}" class="btn btn-sm btn-primary">查看详情</a></td>
                                                </tr>
                                                <tr th:if="${hotMedicineList.size() == 0}">
                                                    <td colspan="4" class="text-center text-muted">暂无数据</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<div th:replace="common/common-bar::#back"></div>

<div th:replace="common/common-bar::#footer"></div>

<div th:replace="common/common-bar::#search"></div>

<div th:replace="common/common-bar::#back-to-top"></div>

<script src="assets/js/jquery-3.5.1.min.js"></script>
<script src="assets/js/bootstrap.min.js"></script>
<script src="assets/js/plugin.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/custom-nav.js"></script>
<script src="assets/js/jpanelmenu.min.js"></script>
<script src="assets/js/dashboard-custom.js"></script>
<script src="common/utils/reg.js"></script>
<script src="common/layer/layer.js"></script>
<script src="common/custom.js"></script>
</body>
</html>
